name: sensei
description: "LinkageApp — Shipox pharmaceutical package management for Al Mokhtabar labs."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management + Dependency Injection
  flutter_riverpod: ^2.6.1

  # Network
  dio: ^5.7.0

  # Serialization / Immutability
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Preferences (non-secret)
  shared_preferences: ^2.3.4

  # Secure storage (tokens)
  flutter_secure_storage: ^9.2.4

  # Navigation
  go_router: ^14.8.1

  # File path for optional log file sink
  path_provider: ^2.1.5

  # Barcode scanning
  mobile_scanner: ^6.0.2

  # Keep screen on during scanning
  wakelock_plus: ^1.2.8

  # Runtime permissions
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.0

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
